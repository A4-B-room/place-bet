<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>カジノ・チンチロ（完成版）</title>
    <style>
        body { background: #051a0d; color: white; font-family: sans-serif; display: flex; justify-content: center; margin: 0; padding: 10px; }
        #game-container { width: 420px; background: #113322; border: 2px solid gold; border-radius: 10px; padding: 20px; text-align: center; position: relative; }
        
        .status { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .val { color: gold; font-weight: bold; font-size: 1.2em; }

        .bet-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        button { cursor: pointer; border: none; border-radius: 4px; padding: 10px 5px; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-plus { background: #ff4444; color: white; }
        .btn-minus { background: #4444ff; color: white; }
        .btn-allin { grid-column: span 4; background: gold; margin-top: 5px; }

        .dice-display { font-size: 45px; font-weight: bold; letter-spacing: 10px; margin: 5px 0; height: 55px; color: #fff; text-shadow: 0 0 10px gold; }
        .rank-name { color: gold; height: 24px; font-size: 1.1em; font-weight: bold; }

        .main-action { width: 100%; padding: 15px; font-size: 1.2em; background: white; font-weight: bold; margin: 10px 0; border-radius: 8px; }
        .main-action:disabled { opacity: 0.5; }

        .history-container { background: #000; border-radius: 5px; padding: 10px; height: 120px; overflow-y: auto; text-align: left; font-size: 0.85em; border: 1px solid #333; }
        .res-win { color: #ffff00; font-weight: bold; }
        .res-lose { color: #ff4444; }

        .gear-btn { position: absolute; top: 10px; right: 10px; background: none; color: white; font-size: 20px; border:none; }
        #settings-modal { display: none; position: absolute; top: 50px; right: 10px; background: #222; border: 1px solid gold; padding: 15px; z-index: 100; text-align: left; }
        #settings-modal input { width: 40px; margin-bottom: 5px; }

        #result-msg { font-size: 1.3em; height: 55px; margin: 10px 0; font-weight: bold; }
        #game-over { display: none; color: red; font-size: 2.5em; font-weight: bold; background: rgba(0,0,0,0.9); position: absolute; top:0; left:0; width:100%; height:100%; justify-content: center; align-items: center; flex-direction: column; z-index: 2000; border-radius: 10px;}
    </style>
</head>
<body>
    
<div id="game-container">
    
<!-- ホームに戻るボタン -->
<a href="index.html" style="position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.8em; border: 1px solid rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 5px;">
    🏠 ロビーへ戻る
</a>
    
    <button class="gear-btn" onclick="toggleSettings()">⚙️</button>
    
    <div id="settings-modal">
        <b>倍率設定</b><br>
        ピンゾロ: <input type="number" id="m-pin" value="5"> 倍<br>
        ゾロ目: <input type="number" id="m-zoro" value="3"> 倍<br>
        シゴロ: <input type="number" id="m-456" value="2"> 倍<br>
        ヒフミ: <input type="number" id="m-123" value="2"> 倍<br>
        <button onclick="toggleSettings()" style="background:gold; width:100%; margin-top:5px;">閉じる</button>
    </div>

    <div class="status">
        <div>💰 所持金: <span id="balance" class="val">100,000</span></div>
        <div>📢 賭け金: <span id="current-bet" class="val">0</span></div>
    </div>

    <div class="bet-area" id="bet-btns-container">
        <button class="btn-plus" onclick="changeBet(100)">+100</button>
        <button class="btn-plus" onclick="changeBet(1000)">+1k</button>
        <button class="btn-plus" onclick="changeBet(10000)">+10k</button>
        <button class="btn-plus" onclick="changeBet(100000)">+100k</button>
        <button class="btn-minus" onclick="changeBet(-100)">-100</button>
        <button class="btn-minus" onclick="changeBet(-1000)">-1k</button>
        <button class="btn-minus" onclick="changeBet(-10000)">-10k</button>
        <button class="btn-minus" onclick="changeBet(-100000)">-100k</button>
        <button class="btn-allin" onclick="allIn()">オールイン / クリア</button>
    </div>

    <div id="dealer-side">
        <p>親の出目 <span id="d-try"></span></p>
        <div id="d-nums" class="dice-display">- - -</div>
        <div id="d-rank" class="rank-name">-</div>
    </div>

    <button id="action-btn" class="main-action" onclick="handleAction()">勝負開始！</button>

    <div id="player-side">
        <p>子の出目 <span id="p-try"></span></p>
        <div id="p-nums" class="dice-display">- - -</div>
        <div id="p-rank" class="rank-name">-</div>
    </div>

    <div id="result-msg"></div>
    <div class="history-container" id="history-log"></div>

    <div id="game-over">
        <div>GAME OVER</div>
        <button onclick="restartGame()" style="background:white; padding:10px 20px; font-size: 0.4em; margin-top:20px; border-radius:5px; border:none; cursor:pointer;">リスタート</button>
    </div>
</div>

<script>
    let balance = 100000;
    let currentBet = 0;
    let gameState = "BET";
    let tries = 0;
    let rollInterval;
    let dResult = null;
    let historyData = [];

    window.onload = () => {
        const saved = localStorage.getItem("casino_shared_balance");
        if (saved !== null) balance = parseInt(saved);
        updateUI();
    };

    function updateUI() {
        document.getElementById("balance").innerText = balance.toLocaleString();
        document.getElementById("current-bet").innerText = currentBet.toLocaleString();
        localStorage.setItem("casino_shared_balance", balance);
        if (balance <= 0 && currentBet === 0) document.getElementById("game-over").style.display = "flex";
        renderHistory();
    }

    function setBetButtonsDisabled(disabled) {
        const btns = document.querySelectorAll('#bet-btns-container button');
        btns.forEach(b => b.disabled = disabled);
    }

    function toggleSettings() {
        const m = document.getElementById("settings-modal");
        m.style.display = (m.style.display === "block") ? "none" : "block";
    }

    function changeBet(v) {
        if(gameState !== "BET") return;
        if(currentBet + v < 0 || currentBet + v > balance) return;
        currentBet += v;
        updateUI();
    }

    function allIn() {
        if(gameState !== "BET") return;
        currentBet = (currentBet === balance) ? 0 : balance;
        updateUI();
    }

    function restartGame() {
        balance = 100000;
        localStorage.setItem("casino_shared_balance", balance);
        location.reload();
    }

    function getRank(d) {
        d.sort();
        const mPin = parseFloat(document.getElementById("m-pin").value);
        const mZoro = parseFloat(document.getElementById("m-zoro").value);
        const m456 = parseFloat(document.getElementById("m-456").value);
        const m123 = parseFloat(document.getElementById("m-123").value);

        if(d[0]===d[1] && d[1]===d[2]) {
            return d[0]===1 ? {name:"ピンゾロ", score:20, mult: mPin} : {name:"ゾロ目", score:15, mult: mZoro};
        }
        if(d[0]===4 && d[1]===5 && d[2]===6) return {name:"シゴロ", score:10, mult: m456};
        if(d[0]===1 && d[1]===2 && d[2]===3) return {name:"ヒフミ", score:-5, mult: m123};
        if(d[0]===d[1]) return {name:d[2]+"の目", score:d[2], mult: 1};
        if(d[1]===d[2]) return {name:d[0]+"の目", score:d[0], mult: 1};
        return {name:"目なし", score:0, mult: 1};
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === "Space" && !document.getElementById("action-btn").disabled) {
            e.preventDefault(); handleAction();
        }
    });

    function handleAction() {
        if (gameState === "BET" && currentBet > 0) {
            gameState = "DEALER_TURN";
            setBetButtonsDisabled(true);
            document.getElementById("action-btn").disabled = true;
            
            document.getElementById("d-nums").innerText = "- - -";
            document.getElementById("p-nums").innerText = "- - -";
            document.getElementById("d-rank").innerText = "-";
            document.getElementById("p-rank").innerText = "-";
            document.getElementById("result-msg").innerText = "";
            document.getElementById("d-try").innerText = "";
            document.getElementById("p-try").innerText = "";
            
            startDealerSequence();
        } else if (gameState === "PLAYER_WAIT") {
            startPlayerRoll();
        } else if (gameState === "PLAYER_ROLLING") {
            stopPlayerRoll();
        }
    }

    async function startDealerSequence() {
        for(let i=1; i<=3; i++) {
            document.getElementById("d-try").innerText = `(${i}/3)`;
            await showShuffle("d-nums");
            const roll = [r(), r(), r()];
            document.getElementById("d-nums").innerText = roll.join(" ");
            dResult = getRank(roll);
            document.getElementById("d-rank").innerText = dResult.name;
            if (dResult.score !== 0) break;
            if (i < 3) await new Promise(res => setTimeout(res, 3000));
        }
        gameState = "PLAYER_WAIT";
        document.getElementById("action-btn").disabled = false;
        document.getElementById("action-btn").innerText = "サイコロを振る (Space)";
    }

    function startPlayerRoll() {
        tries++;
        document.getElementById("p-try").innerText = `(${tries}/3)`;
        gameState = "PLAYER_ROLLING";
        document.getElementById("action-btn").innerText = "止める！ (Space)";
        rollInterval = setInterval(() => {
            document.getElementById("p-nums").innerText = `${r()} ${r()} ${r()}`;
        }, 50);
    }

    function stopPlayerRoll() {
        clearInterval(rollInterval);
        const roll = [r(), r(), r()];
        document.getElementById("p-nums").innerText = roll.join(" ");
        const pRes = getRank(roll);
        document.getElementById("p-rank").innerText = pRes.name;

        if (pRes.score !== 0 || tries >= 3) judge(pRes);
        else {
            gameState = "PLAYER_WAIT";
            document.getElementById("action-btn").innerText = "もう一度振る (Space)";
        }
    }

    function judge(pRes) {
        gameState = "RESULT";
        const btn = document.getElementById("action-btn");
        btn.disabled = true;

        let win = 0; 
        let finalMult = 1;
        if (pRes.score > dResult.score) { win = 1; finalMult = pRes.mult; }
        else if (pRes.score < dResult.score) { win = -1; finalMult = dResult.mult; }

        let change = win * (currentBet * Math.abs(finalMult));
        if (balance + change < 0) change = -balance;
        balance += change;

        const winText = win===1 ? "WIN" : (win===-1 ? "LOSE" : "DRAW");
        const formula = `${currentBet.toLocaleString()} × ${finalMult} = ${Math.abs(change).toLocaleString()}`;
        document.getElementById("result-msg").innerHTML = `<span style="color:${win===1?'gold':'red'}">${winText}</span><br><small>${formula}</small>`;
        
        historyData.unshift({win, text: `${winText} (${pRes.name} vs ${dResult.name}) ${formula}`});
        if(historyData.length > 20) historyData.pop();

        setTimeout(() => {
            gameState = "BET";
            tries = 0; currentBet = 0;
            btn.disabled = false;
            btn.innerText = "勝負開始！";
            setBetButtonsDisabled(false);
            document.getElementById("result-msg").innerText = "";
            updateUI();
        }, 4000);
    }

    async function showShuffle(id) {
        let el = document.getElementById(id);
        for(let i=0; i<10; i++) {
            el.innerText = `${r()} ${r()} ${r()}`;
            await new Promise(r => setTimeout(r, 50));
        }
    }

    function r() { return Math.floor(Math.random()*6)+1; }
    function renderHistory() {
        document.getElementById("history-log").innerHTML = historyData.map(h => 
            `<div class="${h.win===1?'res-win':(h.win===-1?'res-lose':'')}">${h.text}</div>`
        ).join("");
    }
</script>
</body>
</html>
