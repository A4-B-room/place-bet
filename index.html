<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Room 000</title>
    <link rel="icon" type="image/png" sizes="128x128" href="image_coin.png">
    <style>
        body { background: #051a0d; color: white; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; margin: 0; padding: 20px; }
        
        #lobby-container { 
            width: 95%;
            max-width: 440px;
            background: #113322; 
            border: 2px solid gold; 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            position: relative; 
            margin: 40px auto 10px;
            box-sizing: border-box;
        }
        
        h1 { color: gold; text-shadow: 2px 2px 4px black; font-size: 2.2em; margin-bottom: 10px; }
        .subtitle { font-size: 0.9em; opacity: 0.8; margin-bottom: 30px; }

        .balance-display { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid gold; margin-bottom: 30px; }
        .balance-display span { color: gold; font-size: 1.8em; font-weight: bold; }

        .menu-grid { display: grid; gap: 15px; }
        .menu-item { background: #1a472a; border: 2px solid white; border-radius: 12px; padding: 20px; text-decoration: none; color: white; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .menu-item:hover { background: gold; color: black; border-color: gold; transform: scale(1.02); }
        .menu-item b { font-size: 1.2em; }
        .menu-item span { font-size: 0.8em; opacity: 0.7; }
        .menu-item:hover span { opacity: 1; }

        .footer-btns { margin-top: 40px; }
        .reset-btn { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }

        /* スマホ用ズーム防止と文字調整 */
        button, .menu-item { touch-action: manipulation; }
        html { -webkit-text-size-adjust: 100%; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div class="menu-grid">
    <a href="casino_chinchiro.html" class="menu-item">
        <div>
            <b>🎲Room 003</b><br>
            <span>伝統のサイコロ勝負 (チンチロ)</span>
        </div>
        <div>▶</div>
    </a>

    <a href="casino_blackjack.html" class="menu-item">
        <div>
            <b>🎰Room 021</b><br>
            <span>21を狙う駆け引き (BJ)</span>
        </div>
        <div>▶</div>
    </a>

    <a href="casino_poker.html" class="menu-item">
        <div>
            <b>🃏Room 052</b><br>
            <span>最強の役を揃えろ (ポーカー)</span>
        </div>
        <div>▶</div>
    </a>
</div>

    <div class="footer-btns">
        <button class="reset-btn" onclick="resetAll()">全データをリセット</button>
    </div>
</div>

<script>
    function updateLobbyUI() {
        const saved = localStorage.getItem("casino_shared_balance");
        const balance = saved !== null ? parseInt(saved) : 100000;
        document.getElementById("shared-balance").innerText = balance.toLocaleString();
        
        if (saved === null) {
            localStorage.setItem("casino_shared_balance", "100000");
        }
    }

    function resetAll() {
        if (confirm("全ての所持金と履歴がリセットされます。よろしいですか？")) {
            localStorage.clear();
            location.reload();
        }
    }

    // ページ読み込み時に実行
    window.onload = updateLobbyUI;

    // ゲームから「戻る」で戻ってきた時にも確実に実行させる（スマホ対策）
    window.onpageshow = (event) => {
        updateLobbyUI();
    };

    // 画面にフォーカスが合った時にも更新
    window.onfocus = updateLobbyUI;
</script>

</body>
</html>
